<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS - Vision Echo 系統原型</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #4CAF50; }
        #camera-container {
            margin: 20px auto;
            width: 100%;
            max-width: 600px;
            border: 3px solid #333;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #45a049; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }
        #status-panel {
            margin-top: 20px;
            padding: 15px;
            background-color: #333;
            border-radius: 8px;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .log { margin: 5px 0; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px; }
    </style>
    
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDSugW_1LKvgTayTvk9BkUYhzSNCi80Rho&libraries=places"></script>
</head>
<body>

    <h1>ARGUS - Vision Echo</h1>
    <p>讓城市自己說話，讓環境理解取代單純導航</p>

    <div id="camera-container">
        <video id="video-feed" autoplay playsinline></video>
    </div>

    <button class="btn" id="start-btn">1. 啟動 ARGUS 系統 (相機與定位)</button>
    <button class="btn" id="scan-btn" disabled>2. 模擬 AI 視覺辨識 (Vision Echo)</button>

    <div id="status-panel">
        <h3>系統狀態日誌:</h3>
        <div id="logs"></div>
    </div>

    <script>
        const videoElement = document.getElementById('video-feed');
        const startBtn = document.getElementById('start-btn');
        const scanBtn = document.getElementById('scan-btn');
        const logsContainer = document.getElementById('logs');

        // 寫入系統日誌
        function addLog(message) {
            const p = document.createElement('p');
            p.className = 'log';
            p.innerText = `[系統] ${message}`;
            logsContainer.prepend(p);
        }

        // 語音播報功能 (Vision Echo)
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.0; 
                window.speechSynthesis.speak(utterance);
                addLog(`🔊 語音播報: "${text}"`);
            } else {
                addLog("錯誤：您的瀏覽器不支援語音合成功能。");
            }
        }

        // 整合 Google Places API 搜尋周遭環境 (ARGUS Core)
        function searchNearbyPlaces(lat, lng) {
            addLog("ARGUS Core 啟動：正在透過 Google Maps 獲取環境資料...");
            
            // 確保 Google API 已載入
            if (typeof google === 'undefined') {
                addLog("錯誤：Google Maps API 未載入，請確認金鑰是否正確。");
                return;
            }

            const dummyElement = document.createElement('div');
            const service = new google.maps.places.PlacesService(dummyElement);
            const currentLocation = new google.maps.LatLng(lat, lng);
            
            // 設定搜尋條件：以當前位置為中心，半徑 50 公尺內的興趣點
            const request = {
                location: currentLocation,
                radius: '50',
                types: ['store', 'restaurant', 'cafe', 'point_of_interest'] 
            };

            service.nearbySearch(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                    addLog(`地圖分析完成：發現 ${results.length} 個周邊地標。`);
                    
                    let placesFound = [];
                    for (let i = 0; i < Math.min(2, results.length); i++) {
                        placesFound.push(results[i].name);
                    }
                    
                    const feedbackText = `您的附近有：${placesFound[0]} 與 ${placesFound[1]}。`;
                    speak(feedbackText);
                } else {
                    addLog("附近無明顯商家，或 API 金鑰未設定/無效。");
                    speak("目前無法取得地圖資訊，請依賴輔助工具小心行走。");
                }
            });
        }

        // 啟動系統：獲取相機權限與 GPS
        startBtn.addEventListener('click', async () => {
            addLog("正在請求設備權限...");
            try {
                // 1. 獲取攝影機畫面 (模擬眼鏡擷取)
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElement.srcObject = stream;
                addLog("已成功連接攝影機");

                // 2. 獲取 GPS 定位 (結合地圖資料)
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            addLog(`獲取位置成功：緯度 ${lat.toFixed(4)}, 經度 ${lng.toFixed(4)}`);
                            scanBtn.disabled = false; // 啟動成功後允許手動掃描
                            
                            // 定位成功後，立刻呼叫 Google Maps 抓附近商家
                            searchNearbyPlaces(lat, lng); 
                        },
                        (error) => {
                            addLog("獲取位置失敗 請確認已開啟瀏覽器定位權限");
                            scanBtn.disabled = false; 
                        },
                        { enableHighAccuracy: true } // 要求高精度定位
                    );
                }
            } catch (err) {
                addLog(`設備連接失敗: ${err.message} (請確認是否有給予相機與定位權限)`);
            }
        });

        // 模擬 AI 辨識
        scanBtn.addEventListener('click', () => {
            addLog("Vision Echo 正在分析前方影像與環境地圖資料...");
            setTimeout(() => {
                const feedbackText = "左前方偵測到行人，右側為便利商店入口。";
                speak(feedbackText);
            }, 1500); 
        });
    </script>
</body>
</html>
